<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlightHub Webhook Transformer</title>
    <link rel="stylesheet" crossorigin href="/console/assets/index-DZKZ4JKM.css">
    <style>
      #admin-login-overlay{position:fixed;inset:0;background:rgba(15,23,42,.72);display:none;align-items:center;justify-content:center;z-index:99999;font-family:Inter,Arial,sans-serif}
      #admin-login-card{width:min(420px,92vw);background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,.25);border-radius:18px;padding:24px;box-shadow:0 20px 80px rgba(0,0,0,.45)}
      #admin-login-card h2{margin:0 0 8px;font-size:22px}
      #admin-login-card p{margin:0 0 16px;color:#94a3b8;font-size:14px}
      #admin-login-card input{width:100%;padding:12px 14px;margin:8px 0;border-radius:12px;border:1px solid rgba(148,163,184,.25);background:#111827;color:#fff;box-sizing:border-box}
      #admin-login-card button{width:100%;padding:12px 14px;margin-top:10px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:600;cursor:pointer}
      #admin-login-error{margin-top:10px;color:#fca5a5;font-size:13px;min-height:18px}
      #admin-logout-btn{position:fixed;right:16px;bottom:16px;z-index:99998;display:none;padding:10px 14px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:#0f172a;color:#fff;cursor:pointer}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="admin-login-overlay">
      <div id="admin-login-card">
        <h2>Admin Login</h2>
        <p>Sign in to manage integrations, mappings, auth, and FlightHub settings.</p>
        <input id="admin-username" placeholder="Username" autocomplete="username" value="admin" />
        <input id="admin-password" placeholder="Password" type="password" autocomplete="current-password" />
        <button id="admin-login-btn">Sign In</button>
        <div id="admin-login-error"></div>
      </div>
    </div>
    <button id="admin-logout-btn">Logout</button>

    <script>
      (function(){
        const TOKEN_KEY='mw_admin_token';
        const overlay=document.getElementById('admin-login-overlay');
        const err=document.getElementById('admin-login-error');
        const logoutBtn=document.getElementById('admin-logout-btn');
        const sameOriginAdmin=(url)=>{
          try{
            const u=new URL(url, window.location.origin);
            return u.origin===window.location.origin && u.pathname.startsWith('/admin/');
          }catch(e){ return false; }
        };
        const getToken=()=>localStorage.getItem(TOKEN_KEY)||'';
        const showLogin=(msg='')=>{ overlay.style.display='flex'; err.textContent=msg||''; logoutBtn.style.display='none'; };
        const hideLogin=()=>{ overlay.style.display='none'; err.textContent=''; logoutBtn.style.display='block'; };

        const origFetch=window.fetch.bind(window);
        window.fetch=async function(input, init){
          init=init||{};
          const url=(typeof input==='string')?input:(input && input.url)||'';
          if(sameOriginAdmin(url)){
            const headers=new Headers(init.headers|| (input && input.headers) || {});
            const token=getToken();
            if(token) headers.set('X-Admin-Token', token);
            init.headers=headers;
          }
          const res=await origFetch(input, init);
          if(sameOriginAdmin(url) && res.status===401){
            localStorage.removeItem(TOKEN_KEY);
            showLogin('Session expired. Please sign in again.');
          }
          return res;
        };

        const origOpen=XMLHttpRequest.prototype.open;
        const origSend=XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.open=function(method,url){ this._mwUrl=url; return origOpen.apply(this, arguments); };
        XMLHttpRequest.prototype.send=function(body){
          try{
            if(sameOriginAdmin(this._mwUrl)){
              const token=getToken();
              if(token) this.setRequestHeader('X-Admin-Token', token);
            }
          }catch(e){}
          this.addEventListener('load', ()=>{
            try{
              if(sameOriginAdmin(this._mwUrl) && this.status===401){
                localStorage.removeItem(TOKEN_KEY);
                showLogin('Session expired. Please sign in again.');
              }
            }catch(e){}
          });
          return origSend.apply(this, arguments);
        };

        async function checkSession(){
          const token=getToken();
          if(!token){ showLogin(); return false; }
          try{
            const res=await origFetch('/admin/me',{headers:{'X-Admin-Token':token}});
            if(res.ok){ hideLogin(); return true; }
          }catch(e){}
          localStorage.removeItem(TOKEN_KEY);
          showLogin();
          return false;
        }

        document.getElementById('admin-login-btn').addEventListener('click', async ()=>{
          const username=document.getElementById('admin-username').value.trim();
          const password=document.getElementById('admin-password').value;
          err.textContent='';
          try{
            const res=await origFetch('/admin/login',{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({username,password})
            });
            const data=await res.json().catch(()=>({}));
            if(!res.ok || !data.token){
              showLogin(data.detail || data.message || 'Login failed');
              return;
            }
            localStorage.setItem(TOKEN_KEY, data.token);
            hideLogin();
            window.location.reload();
          }catch(e){
            showLogin('Login request failed');
          }
        });

        logoutBtn.addEventListener('click', ()=>{
          localStorage.removeItem(TOKEN_KEY);
          showLogin('Logged out');
        });

        checkSession();
      })();
    </script>
    <script type="module" crossorigin src="/console/assets/index-BUtqXV6a.js"></script>
  </body>
</html>
