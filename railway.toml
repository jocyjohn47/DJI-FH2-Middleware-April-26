# Railway 部署配置
# 文档：https://docs.railway.app/reference/config-as-code
#
# 必须在 Railway 项目中添加 Redis 插件（Add Plugin → Redis）
# Railway 会自动注入以下环境变量到本服务：
#   REDIS_URL        redis://:password@host:port  (自动注入，无需手动填写)
#   PORT             Railway 分配的监听端口       (自动注入)
#
# 可选手动添加：
#   ADMIN_TOKEN      Admin 接口保护 Token

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/deploy/entrypoint.sh"
healthcheckPath = "/docs"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
