<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlightHub Webhook Transformer</title>

    <link rel="stylesheet" crossorigin href="/console/assets/index-DZKZ4JKM.css">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f8fafc;
      }

      #root {
        min-height: 100vh;
        display: none;
      }

      #admin-login-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: Inter, Arial, sans-serif;
      }

      #admin-login-card {
        width: min(420px, 92vw);
        background: #0f172a;
        color: #e2e8f0;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      }

      #admin-login-card h2 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      #admin-login-card p {
        margin: 0 0 16px;
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.5;
      }

      #admin-login-card input {
        width: 100%;
        padding: 12px 14px;
        margin: 8px 0;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #111827;
        color: #fff;
        box-sizing: border-box;
        outline: none;
      }

      #admin-login-card input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
      }

      #admin-login-card button {
        width: 100%;
        padding: 12px 14px;
        margin-top: 10px;
        border: 0;
        border-radius: 12px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      #admin-login-card button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      #admin-login-error {
        margin-top: 10px;
        color: #fca5a5;
        font-size: 13px;
        min-height: 18px;
      }

      #admin-logout-btn {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 99998;
        display: none;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #0f172a;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div id="admin-login-overlay">
      <div id="admin-login-card">
        <h2>Admin Login</h2>
        <p>Sign in to manage integrations, mappings, auth, and FlightHub settings.</p>
        <input id="admin-username" placeholder="Username" autocomplete="username" value="admin" />
        <input id="admin-password" placeholder="Password" type="password" autocomplete="current-password" />
        <button id="admin-login-btn">Sign In</button>
        <div id="admin-login-error"></div>
      </div>
    </div>

    <button id="admin-logout-btn">Logout</button>

    <script>
      (function () {
        const JS_BUNDLE = '/console/assets/index-BUtqXV6a.js';
        let appLoaded = false;

        const overlay = document.getElementById('admin-login-overlay');
        const err = document.getElementById('admin-login-error');
        const logoutBtn = document.getElementById('admin-logout-btn');
        const root = document.getElementById('root');
        const loginBtn = document.getElementById('admin-login-btn');
        const usernameInput = document.getElementById('admin-username');
        const passwordInput = document.getElementById('admin-password');

        function getToken() {
          return localStorage.getItem('admin_token') || '';
        }

        function setToken(token) {
          localStorage.setItem('admin_token', token);
          localStorage.setItem('mw_admin_token', token);
        }

        function clearToken() {
          localStorage.removeItem('admin_token');
          localStorage.removeItem('mw_admin_token');
        }

        function showLogin(message = '') {
          overlay.style.display = 'flex';
          root.style.display = 'none';
          logoutBtn.style.display = 'none';
          err.textContent = message;
        }

        function showApp() {
          overlay.style.display = 'none';
          err.textContent = '';
          root.style.display = 'block';
          logoutBtn.style.display = 'block';
        }

        function loadApp() {
          if (appLoaded) return;
          appLoaded = true;

          const script = document.createElement('script');
          script.type = 'module';
          script.crossOrigin = '';
          script.src = JS_BUNDLE;
          document.body.appendChild(script);
        }

        async function verifyToken(token) {
          if (!token) return false;

          try {
            const res = await fetch('/admin/me', {
              headers: { 'X-Admin-Token': token }
            });
            return res.ok;
          } catch (e) {
            return false;
          }
        }

        async function boot() {
          const token = getToken();

          if (!token) {
            showLogin('');
            return;
          }

          const ok = await verifyToken(token);
          if (!ok) {
            clearToken();
            showLogin('');
            return;
          }

          showApp();
          loadApp();
        }

        async function doLogin() {
          const username = usernameInput.value.trim();
          const password = passwordInput.value;

          err.textContent = '';
          loginBtn.disabled = true;
          loginBtn.textContent = 'Signing in...';

          try {
            const res = await fetch('/admin/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data.token) {
              showLogin(data.detail || data.message || 'Login failed');
              return;
            }

            setToken(data.token);

            const ok = await verifyToken(data.token);
            if (!ok) {
              clearToken();
              showLogin('Login succeeded but session verification failed.');
              return;
            }

            showApp();
            loadApp();
          } catch (e) {
            showLogin('Login request failed');
          } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign In';
          }
        }

        loginBtn.addEventListener('click', doLogin);

        passwordInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') doLogin();
        });

        logoutBtn.addEventListener('click', function () {
          clearToken();
          window.location.href = '/console';
        });

        boot();
      })();
    </script>
  </body>
</html>
